  - date: '2026-06-03'
    rating: 3
    summary: >-
      Complutense University of Madrid (QS World 2025 #164) has a real,
      documented public API footprint primarily through UniversiDATA, the
      collaborative Spanish higher-education open-data platform (DKAN) in which
      UCM is a founding participant. The UniversiDATA developer page documents a
      DataStore API, a CKAN Dataset API, and a DCAT catalog API, all of which
      resolved live. UCM also runs Docta Complutense, a DSpace 7 institutional
      repository (home page live), and an official GitHub organization with a few
      public repos. DSpace REST/OAI-PMH endpoints were not confirmed at standard
      paths, so they are described only at the human-facing level rather than as
      published machine endpoints. No dedicated UCM SIS/course/library developer
      portal was found. No fabrication: only endpoints and properties verified
      live or in official docs are cataloged.
